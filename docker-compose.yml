version: '3.8'

services:
  jobshour-api:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: jobshour-api
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - jobshour-network
    depends_on:
      - jobshour-db
      - jobshour-redis
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=jobshour-db
      - DB_PORT=5432
      - DB_DATABASE=jobshour
      - DB_USERNAME=jobshour
      - DB_PASSWORD=jobshour_secret
      - REDIS_HOST=jobshour-redis
      - QUEUE_CONNECTION=redis
      - BROADCAST_DRIVER=pusher

  jobshour-db:
    image: postgis/postgis:16-3.4
    container_name: jobshour-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=jobshour
      - POSTGRES_USER=jobshour
      - POSTGRES_PASSWORD=jobshour_secret
    volumes:
      - jobshour-db-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - jobshour-network

  jobshour-redis:
    image: redis:7-alpine
    container_name: jobshour-redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    networks:
      - jobshour-network

  jobshour-nginx:
    image: nginx:alpine
    container_name: jobshour-nginx
    restart: unless-stopped
    ports:
      - "8095:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - jobshour-network
    depends_on:
      - jobshour-api

  jobshour-queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: jobshour-queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=60
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - jobshour-network
    depends_on:
      - jobshour-db
      - jobshour-redis
    environment:
      - APP_ENV=local
      - DB_CONNECTION=pgsql
      - DB_HOST=jobshour-db
      - DB_PORT=5432
      - DB_DATABASE=jobshour
      - DB_USERNAME=jobshour
      - DB_PASSWORD=jobshour_secret
      - REDIS_HOST=jobshour-redis
      - QUEUE_CONNECTION=redis
      - BROADCAST_DRIVER=pusher

volumes:
  jobshour-db-data:

networks:
  jobshour-network:
    driver: bridge
